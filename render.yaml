databases:
  - name: aicid-db
    databaseName: aicid
    plan: free

services:
  - type: web
    name: aicid-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aicid-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_URL
        value: https://aicid-net.onrender.com
